<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>actor — Orchestrate coding agents in parallel</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Monaco, Consolas, monospace;
      background: #ffffff;
      color: #000000;
      height: 100vh;
      overflow: hidden;
    }

    #background {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      white-space: pre;
      color: #e0e0e0;
      z-index: 0;
      overflow: hidden;
      line-height: 1;
      font-size: 14px;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 2rem;
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .tagline {
      font-size: 1.1rem;
      color: #555;
      margin-bottom: 2.5rem;
      max-width: 500px;
    }

    .terminal {
      background: #1a1a2e;
      color: #e0e0e0;
      border-radius: 8px;
      padding: 1.5rem;
      text-align: left;
      width: 100%;
      max-width: 620px;
      font-size: 0.85rem;
      line-height: 1.6;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      margin-bottom: 2.5rem;
    }

    .terminal .prompt { color: #888; }
    .terminal .cmd { color: #fff; }
    .terminal .out { color: #6b7; }
    .terminal .dim { color: #666; }

    .actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    a.btn {
      display: inline-block;
      padding: 0.7rem 1.5rem;
      border-radius: 6px;
      text-decoration: none;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      transition: opacity 0.15s;
    }

    a.btn:hover { opacity: 0.85; }

    a.btn-primary {
      background: #000;
      color: #fff;
    }

    a.btn-secondary {
      background: transparent;
      color: #000;
      border: 1.5px solid #ccc;
    }

    .install {
      margin-bottom: 2.5rem;
    }

    .install code {
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 0.8rem 1.5rem;
      border-radius: 8px;
      font-size: 1.1rem;
      display: inline-block;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    }
  </style>
</head>
<body>
  <div id="background"></div>

  <div class="content">
    <h1>actor</h1>
    <p class="tagline">Orchestrate coding agents in parallel.</p>

    <div class="install">
      <code>npx skills add mme/actor.sh -g</code>
    </div>

    <div class="actions">
      <a class="btn btn-primary" href="https://github.com/mme/actor.sh">GitHub</a>
      <a class="btn btn-secondary" href="https://github.com/mme/actor.sh/blob/main/skills/actor/SKILL.md">Skill Docs</a>
    </div>
  </div>

  <script src="js/animation.js"></script>
</body>
</html>
