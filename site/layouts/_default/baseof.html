<!doctype html>
<html lang="en">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  {{ partial "topbar.html" . }}
  {{ partial "sidebar.html" . }}
  <main class="main">
    <article class="article">
      <div class="article-inner">
        {{ block "main" . }}{{ end }}
      </div>
    </article>
    {{ partial "footer.html" . }}
  </main>
  {{ if eq .Kind "page" }}{{ partial "toc.html" . }}{{ end }}
  <script src="{{ "js/theme.js" | relURL }}" defer></script>
</body>
</html>
