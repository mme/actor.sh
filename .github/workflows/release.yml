name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.claude-plugin/**'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump level'
        type: choice
        required: true
        default: patch
        options: [patch, minor, major]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # push the git tag
      id-token: write    # OIDC for PyPI trusted publishing
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v4

      - name: Run tests
        run: uv run python -m unittest discover tests

      - name: Compute next tag
        id: tag
        env:
          BUMP: ${{ inputs.bump || 'patch' }}
        run: |
          # Only consider plain semver tags; skip pre-release / arbitrary tags.
          LATEST=$(git tag --list 'v*' --sort=-v:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | head -n1 \
            | sed 's/^v//')
          LATEST=${LATEST:-0.0.0}
          IFS=. read -r MAJ MIN PAT <<<"$LATEST"
          case "$BUMP" in
            major) MAJ=$((MAJ+1)); MIN=0; PAT=0;;
            minor) MIN=$((MIN+1)); PAT=0;;
            patch) PAT=$((PAT+1));;
          esac
          NEW="v${MAJ}.${MIN}.${PAT}"
          echo "new_tag=${NEW}" >> "$GITHUB_OUTPUT"
          echo "Tag: ${NEW}"

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create local tag
        env:
          NEW_TAG: ${{ steps.tag.outputs.new_tag }}
        # Local tag only; hatch-vcs reads from local git state at build time.
        # We don't push until after PyPI publish succeeds so a failed build
        # doesn't orphan a tag on origin that no wheel backs.
        run: git tag "${NEW_TAG}"

      - name: Build
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Push tag
        env:
          NEW_TAG: ${{ steps.tag.outputs.new_tag }}
        run: git push origin "${NEW_TAG}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_TAG: ${{ steps.tag.outputs.new_tag }}
        run: |
          gh release create "${NEW_TAG}" \
            --title "${NEW_TAG}" \
            --generate-notes \
            dist/*
