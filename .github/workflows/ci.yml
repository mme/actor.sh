name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: '3.13'

      - name: Stub agent binaries
        run: |
          mkdir -p "$HOME/.local/bin"
          for name in claude codex; do
            printf '#!/usr/bin/env bash\nexit 0\n' > "$HOME/.local/bin/$name"
            chmod +x "$HOME/.local/bin/$name"
          done
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run unit tests
        run: uv run python -m unittest discover tests

      - name: Install actor CLI on PATH (needed by e2e harness)
        run: uv tool install -e .

      - name: Run e2e suite (informational, non-blocking)
        # The e2e suite is being filled out incrementally — green is the
        # goal but not the gate. Surfaces the run output so we can see
        # what's failing without blocking unrelated PRs.
        run: uv run python -m unittest discover e2e
        continue-on-error: true
